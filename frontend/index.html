<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital CookBook</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c0562f">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CookBook">
</head>
<body>
  <header>
    <h1>Digital CookBook</h1>
    <button id="user-badge" hidden title="Switch user"></button>
  </header>

  <!-- Login gate (5-3c): shown only when localStorage has no identity yet.
       An email typed once — the family-trust stand-in for real auth. -->
  <div id="login-screen" hidden>
    <form id="login-form">
      <h2>Who's cooking?</h2>
      <p>Enter your email — your cookbook lives under it.</p>
      <input id="login-email" type="email" placeholder="you@example.com" required />
      <button type="submit">Open my cookbook</button>
    </form>
  </div>

  <main>
    <section id="import">
      <h2>Add a recipe</h2>
      <form id="import-form">
        <input id="import-url" type="url" placeholder="Paste an Instagram or TikTok link…" required />
        <button type="submit">Import</button>
      </form>
      <p id="import-status" hidden></p>
    </section>

    <p id="pending-shares" hidden></p>

    <h2>Categories</h2>
    <ul id="category-list">Loading…</ul>

    <form id="add-category-form">
      <input id="new-category-name" type="text" placeholder="New category" maxlength="40" />
      <button type="submit">Add</button>
    </form>

    <h2>Recipes</h2>
    <input type="search" id="search-box" placeholder="Search recipes…" dir="auto" />
    <div id="recipe-list">Loading…</div>
  </main>
  <script src="share-queue.js"></script>
  <script src="app.js"></script>
</body>
</html>
