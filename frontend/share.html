<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saving recipe… — CookBook</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main style="max-width: 480px; margin: 4rem auto; padding: 1.5rem; text-align: center;">
    <h1>Digital CookBook</h1>
    <p id="status">Reading shared link…</p>
    <p><a href="/">← Back to recipes</a></p>
  </main>

  <script src="share-queue.js"></script>
  <script>
    const API_BASE = "https://digital-cookbook-api.onrender.com"; // live backend (matches app.js)
    const statusEl = document.getElementById("status");

    // Shared data arrives as query params (manifest share_target, GET method).
    const params = new URLSearchParams(window.location.search);
    const text = params.get("text") || "";
    const urlParam = params.get("url") || "";

    // Instagram puts the link in `url` sometimes, but usually inside `text`.
    function extractUrl() {
      if (/^https?:\/\//i.test(urlParam)) return urlParam.trim();
      const match = text.match(/https?:\/\/\S+/i);
      return match ? match[0] : "";
    }

    // Fire-and-forget: queue the URL + register a one-off Background Sync,
    // then confirm instantly. The service worker POSTs (and retries) later —
    // the user never waits out Render's cold start. Chromium/Android only.
    async function queueShare(url) {
      const reg = await navigator.serviceWorker.getRegistration();
      if (!reg || !("sync" in reg)) return false;   // no SW / no Background Sync
      await enqueueShare(url);
      await reg.sync.register("share-import");
      return true;
    }

    // Fallback (e.g. iOS Safari): the old synchronous POST — user waits.
    async function importNow(url) {
      statusEl.textContent = "Saving recipe… this can take a minute.";
      const res = await fetch(`${API_BASE}/import`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      if (!res.ok) throw new Error(`Import failed (${res.status})`);
    }

    async function run() {
      const url = extractUrl();
      if (!url) {
        statusEl.textContent = "No link found in the shared content.";
        return;
      }
      try {
        if (!(await queueShare(url))) await importNow(url);
        statusEl.textContent = "Saved! Heading back…";
        // window.close() here is unreliable on installed PWAs: some phones kill
        // the page but not the window, stranding a dead white screen. Navigating
        // to the app is predictable everywhere; the queue banner confirms the share.
        setTimeout(() => { window.location.replace("/"); }, 800);
      } catch (err) {
        statusEl.textContent = `Could not save: ${err.message}`;
      }
    }

    run();
  </script>
</body>
</html>
